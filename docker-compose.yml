version: '3.8'

services:
  # NGINX Gateway - Single entry point
  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - auth
      - api
    networks:
      - agrilens-network

  # Auth Service
  auth:
    build: ./auth
    environment:
      - PORT=3001
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=24h
      - REFRESH_TOKEN_EXPIRES_IN=7d
    expose:
      - "3001"
    networks:
      - agrilens-network

  # API Service
  api:
    build: ./api
    environment:
      - PORT=3002
      - ML_INFER_URL=http://ml-service:5000/infer
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=your-openai-api-key
      - AUTH_SERVICE_URL=http://auth:3001
    expose:
      - "3002"
    depends_on:
      - auth
    networks:
      - agrilens-network

networks:
  agrilens-network:
    driver: bridge