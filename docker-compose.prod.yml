version: '3.8'

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
      - auth
    restart: unless-stopped
    
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3002
    env_file:
      - .env.prod
    restart: unless-stopped
    
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - .env.prod
    restart: unless-stopped